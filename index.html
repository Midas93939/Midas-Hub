<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDAS HUB | ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #fcc200;
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.8);
            --border: rgba(252, 194, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* Animated Background Particles */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--gold);
            filter: blur(150px);
            opacity: 0.1;
            border-radius: 50%;
            z-index: 0;
            animation: float-bg 10s infinite alternate;
        }

        @keyframes float-bg {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 20px;
        }

        /* Floating Logo Animation */
        .logo {
            width: 160px;
            filter: drop-shadow(0 0 20px rgba(252, 194, 0, 0.3));
            animation: breathe 4s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 8px;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Interactive Menu */
        .menu-item {
            padding: 15px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .menu-item:hover {
            border-color: var(--gold);
            background: rgba(252, 194, 0, 0.05);
            letter-spacing: 4px;
        }

        /* Games List Animation */
        #games-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            font-size: 0.75rem;
            color: #888;
        }

        #games-list.active {
            max-height: 200px;
            margin-top: 10px;
            padding-bottom: 10px;
        }

        .game-entry {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .status-dot { color: var(--gold); }

        /* Button Styling */
        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(252, 194, 0, 0.4);
        }

        .notification {
            position: fixed;
            bottom: 20px;
            background: var(--gold);
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="main-container">
        <img src="Midas hub 2.png" class="logo" alt="MIDAS">
        <h1>MIDAS HUB</h1>
        
        <div class="glass-card">
            <div class="menu-item" onclick="toggleGames()">
                > SUPPORTED GAMES
            </div>
            
            <div id="games-list">
                <div class="game-entry"><span>BURGERZ</span> <span class="status-dot">● ONLINE</span></div>
                <div class="game-entry"><span>DIVE!!!V0.2A</span> <span class="status-dot">● ONLINE</span></div>
            </div>

            <button class="btn" onclick="copyScript()">COPY LOADSTRING</button>
        </div>

        <p style="margin-top: 20px; font-size: 0.6rem; color: #444; letter-spacing: 2px;">
            STABLE_BUILD // ENCRYPTED_ACCESS
        </p>
    </div>

    <div id="notif" class="notification">LOADSTRING COPIED!</div>

    <script>
        function toggleGames() {
            document.getElementById('games-list').classList.toggle('active');
        }

        function copyScript() {
            const script = 'loadstring(game:HttpGet("YOUR_LINK_HERE"))()';
            navigator.clipboard.writeText(script);
            
            const notif = document.getElementById('notif');
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
