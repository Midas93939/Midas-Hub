<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidShell | Official Repository</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --bg-dark: #0a0a0a;
            --gray: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal-window {
            border: 1px solid var(--neon-green);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 2px 2px #ff0000, -2px -2px #0000ff; /* Subtle Glitch */
        }

        .typing {
            border-right: 2px solid var(--neon-green);
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: typing 3.5s steps(30, end), blink-caret 0.75s step-end infinite;
        }

        .download-btn {
            margin-top: 30px;
            display: inline-block;
            padding: 15px 30px;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 15px var(--neon-green);
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--neon-green); } }
    </style>
</head>
<body>

    <div class="terminal-window">
        <h1>VoidShell</h1>
        <p class="typing">Connecting to remote server... Success.</p>
        
        <p style="margin-top: 20px; opacity: 0.8;">
            Advanced management and automation tools for developers.
        </p>

        <a href="VOID_SHELL.exe" class="download-btn" download>
            [ Download Latest Build ]
        </a>
    </div>

</body>
</html>
